name: Sync Tracked List

# Receives base64-encoded JSON from the dashboard's "Sync" button
# and writes data/tracked.json to the repo.

on:
  workflow_dispatch:
    inputs:
      payload_b64:
        description: 'Base64-encoded JSON {tracked, dismissed, last_synced}'
        required: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Decode and write tracked.json
        env:
          PAYLOAD_B64: ${{ github.event.inputs.payload_b64 }}
        run: |
          set -e
          mkdir -p data
          echo "$PAYLOAD_B64" | base64 -d > data/tracked.json
          # quick validity check
          python -c "import json; d=json.load(open('data/tracked.json')); print(f'tracked: {len(d.get(\"tracked\",[]))} | dismissed: {len(d.get(\"dismissed\",[]))} | synced: {d.get(\"last_synced\")}')"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/tracked.json
          git diff --staged --quiet || git commit -m "Sync tracked list $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

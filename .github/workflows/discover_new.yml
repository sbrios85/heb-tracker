name: Discover New Products

# Weekly catalog discovery: re-scans H-E-B for NEW brands and products added
# since the last run, and marks first_seen/last_seen. New products appear in
# your Review tab to triage. Dismissed products are skipped (never re-added).
# Blocked brands are skipped. Runs Saturdays 07:00 UTC (2am CT) + manually.
#
# This does NOT fetch full price details — it just updates products.json with
# the catalog. Run Full Refresh (or wait for its Sunday run) to pull prices
# for any newly-discovered products.

on:
  schedule:
    - cron: "0 7 * * 6"      # Saturdays 07:00 UTC (2am Central)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Discover brands
        run: python scraper/heb_discover_brands.py

      - name: Discover products
        run: python scraper/heb_discover_products.py

      - name: Commit brands.json + products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/brands.json data/products.json
          git diff --staged --quiet || git commit -m "Discovery $(date -u +%Y-%m-%d)"
          git pull --rebase || true
          git push

name: Probe Categories

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scraper/probe_categories.py
      - name: Commit categories.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/categories.json
          git diff --staged --quiet || git commit -m "Category probe $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

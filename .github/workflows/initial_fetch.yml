name: Initial Fetch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    # GitHub Actions max is 360 (6h). Leave buffer for commit step.
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run initial fetch (resumable)
        run: python scraper/heb_initial_fetch.py
      - name: Upload details.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: details
          path: data/details.json
          retention-days: 30
      - name: Commit details.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/details.json
          git diff --staged --quiet || git commit -m "Initial fetch progress $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push

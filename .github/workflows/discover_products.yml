name: Discover Products

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run product discovery
        run: python scraper/heb_discover_products.py
      - name: Upload products.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: products
          path: data/products.json
          retention-days: 30
      - name: Commit products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/products.json
          git diff --staged --quiet || git commit -m "Product discovery $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

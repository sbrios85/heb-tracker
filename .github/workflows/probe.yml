
name: Probe HEB GraphQL

# Manual trigger only — this is a one-time discovery step
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run probe
        run: python scraper/probe_heb_graphql.py

      - name: Upload probe output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-output
          path: probe_output/
          retention-days: 7

      - name: Commit probe output to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f probe_output/
          git diff --staged --quiet || git commit -m "Probe output from $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
